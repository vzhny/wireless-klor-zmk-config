:root{--bg:#1a1917;--display-bg:#000;--display-fg:#fff;--div:#333;--lbl:#6a6760;--title:#ccc;--mono:ui-monospace,'SF Mono','Courier New',monospace;--batt-low:#e05555;}

.di svg{width:100%;height:100%;display:block;}
.tx{fill:var(--display-fg);font-family:var(--mono);}

function g(x,y,body,opacity){
  return '<g transform="translate('+x+','+y+')" opacity="'+(opacity===undefined?1:opacity)+'">'+body+'</g>';
}

function battery(x,y,pct,fg){
  var innerW=20, w=Math.max(0,Math.round(innerW*pct/100));
  var low = pct<=20;
  var fillColor = low ? 'var(--batt-low)' : (fg||'currentColor');
  return '<g transform="translate('+x+','+y+')">'
    + '<rect x="0" y="0" width="22" height="10" fill="none" stroke="currentColor" stroke-width="1"/>'
    + '<rect x="1" y="1" width="'+w+'" height="8" fill="'+fillColor+'"/>'
    + '<rect x="22" y="3" width="2" height="4" fill="currentColor"/>'
    + '<text x="28" y="9" font-size="8" class="tx">'+pct+'%</text>'
    + '</g>';
}

function rule(y){
  return '<rect x="0" y="'+y+'" width="128" height="1" fill="currentColor"/>';
}

  var isMac = o.isMac || false;

  var osIcon = isMac ? ICON_KLOR_OS_MAC_ICON : ICON_KLOR_OS_WIN_ICON;

    + '<rect x="0" y="0" width="128" height="64" fill="var(--display-bg)"/>'
    + '<g fill="var(--display-fg)" color="var(--display-fg)">'
    + g(0, 1, ICON_KLOR_BT_ICON, btConnected ? 1 : 0)
    + battery(78, 3, battLevel)
    + '<text x="0" y="24" font-size="8" class="tx">'+layer+'</text>'
    + rule(27)
    + g(0, 31, osIcon)
    + g(98, 31, ICON_KLOR_FACE_ICON)
    + rule(49)
    + g(0, 53, ICON_KLOR_LOCK_NUM_ICON, numLock ? 1 : 0)
    + g(14, 53, ICON_KLOR_LOCK_CAPS_ICON, capsLock ? 1 : 0)
    + g(28, 53, ICON_KLOR_LOCK_SCROLL_ICON, scrollLock ? 1 : 0)
    + '</g></svg>';
  return '<div class="display"><div class="di">'+s+'</div></div>';
}

/* ---- Peripheral (secondary) screen ---- */
function peripheral(o){
  var battLevel = o.batt===undefined ? 75 : o.batt;
  var connected = o.connected===undefined ? true : o.connected;

  var s = '<svg viewBox="0 0 128 64" xmlns="http://www.w3.org/2000/svg">'
    + '<rect x="0" y="0" width="128" height="64" fill="var(--display-bg)"/>'
    + '<g fill="var(--display-fg)" color="var(--display-fg)">'
    + g(0, 0, ICON_KLOR_FACE_FULL)
    + '<rect x="0" y="0" width="128" height="16" fill="var(--display-bg)"/>'
    + g(0, 1, ICON_KLOR_WIFI_ICON, connected ? 1 : 0)
    + battery(78, 3, battLevel)
    + '</g></svg>';
  return '<div class="display"><div class="di">'+s+'</div></div>';
}

function row(lbl, html){
  return '<div class="sw"><div class="sl">'+lbl.replace(/\n/g,'<br>')+'</div>'+html+'</div>';
}

var left = [
  row('Qwerty (Win)\nBT connected, 75%\nno locks', central({layer:'Qwerty (Win)', batt:75, bt:true})),
  row('Qwerty (Mac)\nBT connected, 90%\nNum Lock on', central({layer:'Qwerty (Mac)', isMac:true, batt:90, bt:true, num:true})),
  row('Colemak-DH (Win)\nBT connected, 60%\nCaps Lock on', central({layer:'Colemak-DH (Win)', batt:60, bt:true, caps:true})),
  row('Numbers\nBT connected, 50%\nScroll Lock on', central({layer:'Numbers', batt:50, bt:true, scroll:true})),
  row('Admin\nBT disconnected\n25% (low)', central({layer:'Admin', batt:25, bt:false})),
  row('Function Keys\nBT connected, 45%', central({layer:'Function Keys', batt:45, bt:true})),
];

var right = [
  row('Connected\n80%', peripheral({batt:80, connected:true})),
  row('Connected\n65%', peripheral({batt:65, connected:true})),
  row('Disconnected\n14% (low)', peripheral({batt:14, connected:false})),
];

document.getElementById('root').innerHTML =
  '<div><div class="col-title">Left half &middot; central</div><div class="states-col">'+left.join('')+'</div></div>'
  + '<div><div class="col-title">Right half &middot; peripheral</div><div class="states-col">'+right.join('')+'</div></div>';
</script>
