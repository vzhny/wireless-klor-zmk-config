<title>KLOR &mdash; OLED Display States</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#1a1917;--display-bg:#000;--display-fg:#fff;--lbl:#6a6760;--title:#ccc;--mono:ui-monospace,'SF Mono','Courier New',monospace;--sans:-apple-system,'Segoe UI',sans-serif;}
body{background:var(--bg);font-family:var(--sans);padding:32px 28px;min-height:100vh;}
h1{font-size:12px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--title);margin-bottom:5px;}
.sub{font-size:10px;color:var(--lbl);margin-bottom:26px;letter-spacing:.04em;}
.grid{display:flex;gap:48px;flex-wrap:wrap;align-items:flex-start;}
.col-title{font-size:9px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--lbl);margin-bottom:12px;}
.states-col{display:flex;flex-direction:column;gap:22px;}
.sw{display:flex;align-items:flex-start;gap:12px;}
.sl{font-size:9px;color:var(--lbl);width:130px;padding-top:2px;line-height:1.7;flex-shrink:0;}
.display{width:288px;height:152px;background:#0a0a0a;border-radius:7px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(0,0,0,.8);flex-shrink:0;padding:8px;}
.di{width:256px;height:128px;background:var(--display-bg);position:relative;font-size:0;}
.row{position:absolute;left:0;right:0;display:flex;align-items:center;gap:4px;padding:0 2px;}
.row.right{justify-content:flex-end;}
.badge{display:inline-flex;align-items:center;justify-content:center;background:#000;color:#fff;font-family:var(--mono);font-size:15px;font-weight:700;letter-spacing:.02em;padding:1px 5px;line-height:1.5;}
.badge.on{background:#fff;color:#000;}
.badge.pct{background:#000;color:#fff;}
.rule{position:absolute;left:0;right:0;height:2px;background:#fff;}
.layer{position:absolute;left:4px;color:#fff;font-family:var(--mono);font-size:15px;letter-spacing:.02em;}
.face{position:absolute;}
.face svg{display:block;width:60px;height:32px;}
</style>
<h1>KLOR &mdash; OLED Display States</h1>
<p class="sub">128&times;64 SSD1306 &middot; 2&times; scale &middot; badge-style status indicators, monospace layer name</p>
<div class="grid" id="root"></div>
<script>
var FACE_SVG = '<svg viewBox="0 0 30 16" xmlns="http://www.w3.org/2000/svg" fill="#fff"><rect x="8" y="0" width="14" height="1" fill="currentColor"/><rect x="7" y="1" width="16" height="1" fill="currentColor"/><rect x="7" y="2" width="16" height="1" fill="currentColor"/><rect x="7" y="3" width="16" height="1" fill="currentColor"/><rect x="3" y="4" width="7" height="1" fill="currentColor"/><rect x="12" y="4" width="6" height="1" fill="currentColor"/><rect x="20" y="4" width="7" height="1" fill="currentColor"/><rect x="2" y="5" width="7" height="1" fill="currentColor"/><rect x="13" y="5" width="4" height="1" fill="currentColor"/><rect x="21" y="5" width="7" height="1" fill="currentColor"/><rect x="2" y="6" width="7" height="1" fill="currentColor"/><rect x="13" y="6" width="4" height="1" fill="currentColor"/><rect x="21" y="6" width="7" height="1" fill="currentColor"/><rect x="2" y="7" width="8" height="1" fill="currentColor"/><rect x="12" y="7" width="6" height="1" fill="currentColor"/><rect x="20" y="7" width="8" height="1" fill="currentColor"/><rect x="2" y="8" width="26" height="1" fill="currentColor"/><rect x="2" y="9" width="11" height="1" fill="currentColor"/><rect x="17" y="9" width="11" height="1" fill="currentColor"/><rect x="2" y="10" width="11" height="1" fill="currentColor"/><rect x="17" y="10" width="11" height="1" fill="currentColor"/><rect x="3" y="11" width="9" height="1" fill="currentColor"/><rect x="14" y="11" width="2" height="1" fill="currentColor"/><rect x="18" y="11" width="9" height="1" fill="currentColor"/><rect x="7" y="12" width="5" height="1" fill="currentColor"/><rect x="14" y="12" width="2" height="1" fill="currentColor"/><rect x="18" y="12" width="5" height="1" fill="currentColor"/><rect x="7" y="13" width="4" height="1" fill="currentColor"/><rect x="13" y="13" width="4" height="1" fill="currentColor"/><rect x="19" y="13" width="4" height="1" fill="currentColor"/><rect x="7" y="14" width="4" height="1" fill="currentColor"/><rect x="13" y="14" width="4" height="1" fill="currentColor"/><rect x="19" y="14" width="4" height="1" fill="currentColor"/><rect x="7" y="15" width="16" height="1" fill="currentColor"/></svg>';

function badge(text, on){
  return '<span class="badge'+(on?' on':'')+'">'+text+'</span>';
}
function pctBadge(pct){
  return '<span class="badge pct">'+pct+'%</span>';
}

var WIN_MODS  = [['SFT','s'],['CTL','c'],['GUI','g'],['ALT','a']];
var MAC_MODS  = [['SFT','s'],['CMD','g'],['CTL','c'],['OPT','a']];
var WIN_MODS_R = [['ALT','a'],['GUI','g'],['CTL','c'],['SFT','s']];
var MAC_MODS_R = [['OPT','a'],['CTL','c'],['CMD','g'],['SFT','s']];

function modRow(list, held){
  var s='';
  for (var i=0;i<list.length;i++){
    s += badge(list[i][0], held.indexOf(list[i][1])!==-1);
  }
  return s;
}

/* ---- Central (primary) screen ---- */
function central(o){
  var layer = o.layer || 'Qwerty (Win)';
  var isMac = o.isMac || false;
  var battLevel = o.batt===undefined ? 75 : o.batt;
  var charging = o.charging || false;
  var btConnected = o.bt===undefined ? true : o.bt;
  var activeLayer = o.activeLayer===undefined ? 0 : o.activeLayer;
  var held = o.held || [];

  var mods = isMac ? MAC_MODS : WIN_MODS;

  var layerBadges='';
  for (var n=1;n<=9;n++){
    layerBadges += badge(''+n, activeLayer===(n-1));
  }

  return '<div class="display"><div class="di">'
    + '<div class="row" style="top:2px;left:2px;">'+badge('BT', btConnected)+'</div>'
    + '<div class="row right" style="top:2px;right:2px;">'+badge(charging?'CHG':'BAT',false)+pctBadge(battLevel)+'</div>'
    + '<div class="layer" style="top:32px;">'+layer+'</div>'
    + '<div class="rule" style="top:54px;"></div>'
    + '<div class="row" style="top:62px;left:2px;">'+modRow(mods, held)+'</div>'
    + '<div class="face" style="top:62px;right:2px;">'+FACE_SVG+'</div>'
    + '<div class="rule" style="top:98px;"></div>'
    + '<div class="row" style="top:106px;left:2px;">'+layerBadges+'</div>'
    + '</div></div>';
}

/* ---- Peripheral (secondary) screen ---- */
function peripheral(o){
  var battLevel = o.batt===undefined ? 75 : o.batt;
  var charging = o.charging || false;
  var connected = o.connected===undefined ? true : o.connected;
  var isMac = o.isMac || false;
  var held = o.held || [];

  var mods = isMac ? MAC_MODS_R : WIN_MODS_R;

  return '<div class="display"><div class="di">'
    + '<div class="row" style="top:2px;left:2px;">'+badge('LINKED', connected)+'</div>'
    + '<div class="row right" style="top:2px;right:2px;">'+badge(charging?'CHG':'BAT',false)+pctBadge(battLevel)+'</div>'
    + '<div class="rule" style="top:54px;"></div>'
    + '<div class="face" style="top:62px;left:2px;">'+FACE_SVG+'</div>'
    + '<div class="row right" style="top:62px;right:2px;">'+modRow(mods, held)+'</div>'
    + '<div class="rule" style="top:98px;"></div>'
    + '</div></div>';
}

function row(lbl, html){
  return '<div class="sw"><div class="sl">'+lbl.replace(/\n/g,'<br>')+'</div>'+html+'</div>';
}

var left = [
  row('Qwerty (Win)\nBT connected, 75%\nbase layer, no mods held', central({layer:'Qwerty (Win)', batt:75, bt:true, activeLayer:0})),
  row('Qwerty (Mac)\nBT connected, 90%\nlayer 2, Shift+Cmd held', central({layer:'Qwerty (Mac)', isMac:true, batt:90, bt:true, activeLayer:1, held:['s','g']})),
  row('Colemak-DH (Win)\nBT connected, 60%\nlayer 3, Ctrl held', central({layer:'Colemak-DH (Win)', batt:60, bt:true, activeLayer:2, held:['c']})),
  row('Numbers\nBT connected, 50%\nlayer 5', central({layer:'Numbers', batt:50, bt:true, activeLayer:4})),
  row('Admin\nBT disconnected\nlayer 8, 25%', central({layer:'Admin', batt:25, bt:false, activeLayer:7})),
  row('Function Keys\nCharging, 45%\nlayer 9', central({layer:'Function Keys', batt:45, charging:true, activeLayer:8})),
];

var right = [
  row('Linked, 80%\nWin mods, none held', peripheral({batt:80, connected:true})),
  row('Linked, 65%\nWin mods, Alt+Shift held', peripheral({batt:65, connected:true, held:['a','s']})),
  row('Linked, Mac mods\nCmd held, 70%', peripheral({batt:70, connected:true, isMac:true, held:['g']})),
  row('Not linked, 14%', peripheral({batt:14, connected:false})),
];

document.getElementById('root').innerHTML =
  '<div><div class="col-title">Left half &middot; central</div><div class="states-col">'+left.join('')+'</div></div>'
  + '<div><div class="col-title">Right half &middot; peripheral</div><div class="states-col">'+right.join('')+'</div></div>';
</script>
